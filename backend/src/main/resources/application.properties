spring.application.name=activiti-ai-dashboard
# Spring Datasource (Use placeholders as before)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Activiti Engine Settings (THIS IS THE FIX)
activiti.database-schema-update=true
activiti.check-process-definitions=false
activiti.history-level=full

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
