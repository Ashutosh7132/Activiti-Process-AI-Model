spring.application.name=activiti-ai-dashboard
# Spring Datasource - Using clean injection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
server.port=${PORT:8080}

# Activiti & JPA
activiti.database-schema-update=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Activiti Engine Settings (THIS IS THE FIX)
activiti.database-schema-update=true
activiti.check-process-definitions=false
activiti.history-level=full
